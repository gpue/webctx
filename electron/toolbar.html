<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>webctx</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 52px;
      overflow: hidden;
      user-select: none;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      height: 52px;
      -webkit-app-region: drag;
    }
    .toolbar button, .toolbar input, .toolbar .app-icon, .toolbar .selection-badge {
      -webkit-app-region: no-drag;
    }
    .toolbar button {
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
      position: relative;
      flex-shrink: 0;
    }
    .toolbar button:hover { background: #45475a; }
    .toolbar button:active { background: #585b70; }
    .toolbar button.active { background: #89b4fa; color: #1e1e2e; }
    .url-bar {
      flex: 1;
      height: 32px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-bar:focus { border-color: #89b4fa; }
    #btn-go {
      width: 40px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .selection-badge {
      background: #a6e3a1;
      color: #1e1e2e;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
      display: none;
    }
    .selection-badge.visible { display: inline-block; }
    .app-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .app-icon svg { width: 22px; height: 22px; }
    /* Tooltips — shown ABOVE controls so BrowserView doesn't cover them */
    [data-tooltip] { position: relative; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: #11111b;
      color: #cdd6f4;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      border: 1px solid #45475a;
    }
    [data-tooltip]:hover::after { opacity: 1; }
    .url-bar[data-tooltip]::after { top: -26px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="app-icon" data-tooltip="webctx">
      <svg viewBox="0 0 24 24" fill="none" stroke="#89b4fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5" fill="#89b4fa" stroke="none"/>
        <path d="M14 10l-2 2 4 4"/>
        <path d="M16 12l-4 4"/>
      </svg>
    </span>
    <button id="btn-back" data-tooltip="Back">&#9664;</button>
    <button id="btn-forward" data-tooltip="Forward">&#9654;</button>
    <button id="btn-reload" data-tooltip="Reload">&#8635;</button>
    <input type="text" class="url-bar" id="url-bar" placeholder="Enter URL or search..." spellcheck="false" data-tooltip="URL or search query">
    <button id="btn-go" data-tooltip="Navigate">Go</button>
    <button id="btn-picker" data-tooltip="Element picker">&#9783;</button>
    <span class="selection-badge" id="selection-badge" data-tooltip="Selected elements">0</span>
    <button id="btn-clear" data-tooltip="Clear selection">&#10005;</button>
    <button id="btn-screenshot" data-tooltip="Screenshot">&#9745;</button>
  </div>

  <script>
    const urlBar = document.getElementById('url-bar');
    const btnPicker = document.getElementById('btn-picker');
    const badge = document.getElementById('selection-badge');

    function doNavigate() {
      const val = urlBar.value.trim();
      if (val) {
        urlBar.blur();
        window.webctxToolbar.navigate(val);
      }
    }

    // Both keydown and keyup for maximum compatibility with Electron drag regions
    urlBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.stopPropagation();
        doNavigate();
      }
    });

    document.getElementById('btn-go').addEventListener('click', doNavigate);
    document.getElementById('btn-back').addEventListener('click', () => window.webctxToolbar.goBack());
    document.getElementById('btn-forward').addEventListener('click', () => window.webctxToolbar.goForward());
    document.getElementById('btn-reload').addEventListener('click', () => window.webctxToolbar.reload());
    document.getElementById('btn-clear').addEventListener('click', () => window.webctxToolbar.clearSelection());
    document.getElementById('btn-screenshot').addEventListener('click', () => window.webctxToolbar.screenshot({}));

    btnPicker.addEventListener('click', async () => {
      const active = await window.webctxToolbar.togglePicker();
      btnPicker.classList.toggle('active', active);
    });

    window.webctxToolbar.onUrlChanged((url) => { urlBar.value = url; });
    window.webctxToolbar.onSelectionUpdated((ctx) => {
      const count = ctx.selectedElements.length;
      badge.textContent = count;
      badge.classList.toggle('visible', count > 0);
    });
  </script>
</body>
</html>
