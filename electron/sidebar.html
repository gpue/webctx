<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' https: data:">
  <title>Context</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #313244;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }
    .sidebar-header .header-actions {
      display: flex;
      gap: 6px;
    }
    .header-btn {
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-btn:hover { background: #45475a; }
    .header-btn.danger:hover { background: #f38ba8; color: #1e1e2e; }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c7086;
      padding: 8px 4px 4px;
    }
    .empty-msg {
      font-size: 12px;
      color: #585b70;
      font-style: italic;
      padding: 8px 4px;
    }
    .ctx-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #181825;
      border: 1px solid #313244;
      position: relative;
      transition: background 0.15s;
    }
    .ctx-item:hover { background: #1e1e2e; }
    .ctx-item .item-icon {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: #313244;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      color: #89b4fa;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
    }
    .ctx-item .item-body {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .ctx-item .item-tag {
      font-size: 11px;
      font-weight: 600;
      color: #89b4fa;
    }
    .ctx-item .item-selector {
      font-size: 10px;
      color: #6c7086;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .ctx-item .item-text {
      font-size: 10px;
      color: #a6adc8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .item-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: none;
      background: transparent;
      color: #585b70;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      padding: 0;
    }
    .ctx-item:hover .item-remove,
    .screenshot-item:hover .item-remove { opacity: 1; }
    .item-remove:hover { background: #f38ba8; color: #1e1e2e; }

    .resize-handle {
      position: absolute;
      left: 0;
      top: 0;
      width: 5px;
      height: 100%;
      cursor: col-resize;
      z-index: 100;
      background: transparent;
      transition: background 0.15s;
    }
    .resize-handle:hover,
    .resize-handle.active {
      background: #89b4fa;
    }

    .screenshot-item {
      margin-bottom: 4px;
      border-radius: 6px;
      background: #181825;
      border: 1px solid #313244;
      overflow: hidden;
      position: relative;
    }
    .screenshot-item .item-remove {
      background: rgba(17,17,27,0.7);
      z-index: 1;
    }
    .screenshot-item img {
      width: 100%;
      display: block;
      cursor: pointer;
    }
    .screenshot-item .ss-meta {
      padding: 4px 8px;
      font-size: 10px;
      color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="resize-handle" id="resize-handle"></div>
  <div class="sidebar-header">
    <h2>Context</h2>
    <div class="header-actions">
      <button id="btn-to-shell" class="header-btn" title="Generate prompt and paste into terminal">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19h8"/><path d="m4 17 6-6-6-6"/></svg> To Shell
      </button>
      <button id="btn-screenshot" class="header-btn" title="Take screenshot">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/><circle cx="12" cy="13" r="3"/></svg> Screenshot
      </button>
      <button id="btn-clear-all" class="header-btn danger" title="Clear all context">
        Clear All
      </button>
    </div>
  </div>
  <div class="content" id="content">
    <div id="items-list"><span class="empty-msg">No context items yet</span></div>
  </div>

  <script>
    const itemsList = document.getElementById('items-list');

    document.getElementById('btn-clear-all').addEventListener('click', () => {
      window.webctxSidebar.clearAll();
    });

    document.getElementById('btn-screenshot').addEventListener('click', () => {
      window.webctxSidebar.takeScreenshot();
    });

    document.getElementById('btn-to-shell').addEventListener('click', () => {
      window.webctxSidebar.copyToShell();
    });

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderItems(items) {
      itemsList.innerHTML = '';
      if (!items || items.length === 0) {
        itemsList.innerHTML = '<span class="empty-msg">No context items yet</span>';
        return;
      }
      for (const item of items) {
        if (item.type === 'element') {
          const el = item.data;
          const div = document.createElement('div');
          div.className = 'ctx-item';
          div.dataset.itemId = item.id;
          div.dataset.selector = el.cssSelector;
          const text = el.textContent ? escapeHtml(el.textContent.slice(0, 60)) : '';
          const idPart = el.attributes.id ? '#' + escapeHtml(el.attributes.id) : '';
          const classPart = el.attributes.class ? '.' + escapeHtml(el.attributes.class.split(' ')[0]) : '';
          div.innerHTML = `
            <div class="item-icon">&lt;${escapeHtml(el.tagName)}&gt;</div>
            <div class="item-body">
              <div class="item-tag">${escapeHtml(el.tagName)}${idPart}${classPart}</div>
              <div class="item-selector" title="${escapeHtml(el.cssSelector)}">${escapeHtml(el.cssSelector)}</div>
              ${text ? `<div class="item-text">${text}</div>` : ''}
            </div>
            <button class="item-remove" title="Remove"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
          `;
          div.querySelector('.item-remove').addEventListener('click', (e) => {
            e.stopPropagation();
            window.webctxSidebar.removeItem(item.id);
          });
          // Hover highlight
          div.addEventListener('mouseenter', () => {
            window.webctxSidebar.highlightElement(el.cssSelector);
          });
          div.addEventListener('mouseleave', () => {
            window.webctxSidebar.clearHighlight();
          });
          itemsList.appendChild(div);
        } else if (item.type === 'screenshot') {
          const ss = item.data;
          const div = document.createElement('div');
          div.className = 'screenshot-item';
          div.dataset.itemId = item.id;
          div.innerHTML = `
            <button class="item-remove" title="Remove"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            <img src="data:image/png;base64,${ss.dataBase64}" alt="Screenshot">
            <div class="ss-meta">${ss.width}\u00d7${ss.height} &middot; ${new Date(item.timestamp).toLocaleTimeString()}</div>
          `;
          div.querySelector('.item-remove').addEventListener('click', (e) => {
            e.stopPropagation();
            window.webctxSidebar.removeItem(item.id);
          });
          itemsList.appendChild(div);
        }
      }
    }

    window.webctxSidebar.onContextUpdated((data) => {
      renderItems(data.items);
    });

    // Resize handle
    const resizeHandle = document.getElementById('resize-handle');
    resizeHandle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      resizeHandle.classList.add('active');
      window.webctxSidebar.resizeStart();
      const onMouseUp = () => {
        resizeHandle.classList.remove('active');
        window.webctxSidebar.resizeEnd();
        document.removeEventListener('mouseup', onMouseUp);
      };
      document.addEventListener('mouseup', onMouseUp);
    });
  </script>
</body>
</html>
